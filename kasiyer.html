<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B1120">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest-kasiyer.json">
  <link rel="apple-touch-icon" href="/icon-kasiyer-192.png">
  <title>MarketPas — Kasiyer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="kasiyer.css">
</head>
<body>
  <!-- Giriş -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">MARKET·PAS</div>
      <div class="login-sub">Kasiyer Girişi</div>
      <div class="form-group"><label>Market ID</label><input type="text" id="login-market" placeholder="Yönetimden alınan ID" autocomplete="off" spellcheck="false"></div>
      <div class="form-group"><label>Kasa Numarası</label><input type="number" id="login-kasa" placeholder="Örn: 3" min="1"></div>
      <div class="form-group"><label>Kasiyer PIN</label><input type="password" id="login-pin" placeholder="PIN" onkeydown="if(event.key==='Enter') handleLogin()"></div>
      <div id="login-error" style="color:#f87171;font-size:13px;margin-bottom:8px;display:none"></div>
      <button class="btn-login" id="btn-login" onclick="handleLogin()">Giriş Yap</button>
    </div>
  </div>

  <!-- Ana Ekran -->
  <div id="main-screen">
    <!-- ÜST BAR -->
    <div class="top-bar">
      <div class="tb-left">
        <div class="tb-kasa" id="kasa-no">KASA —</div>
        <div class="tb-market" id="header-market-name"></div>
      </div>
      <div class="tb-center">
        <div class="tb-clock" id="live-clock">--:--:--</div>
        <div class="tb-date" id="live-date">--</div>
      </div>
      <div class="tb-right">
        <div class="tb-status"><div class="status-dot"></div>Çevrimiçi</div>
        <button class="tb-logout" onclick="handleLogout()">⬅</button>
      </div>
    </div>

    <!-- İSTATİSTİK BARI -->
    <div class="stat-bar">
      <div class="sb-item"><div class="sb-icon">👥</div><div class="sb-val" id="queue-count-display">0</div><div class="sb-lbl">Sırada</div></div>
      <div class="sb-item"><div class="sb-icon">✅</div><div class="sb-val" id="stat-served">0</div><div class="sb-lbl">Hizmet</div></div>
      <div class="sb-item"><div class="sb-icon">⏱</div><div class="sb-val" id="stat-avg">—</div><div class="sb-lbl">Ort. dk</div></div>
      <div class="sb-item"><div class="sb-icon">🕐</div><div class="sb-val" id="stat-start">—</div><div class="sb-lbl">Başlama</div></div>
    </div>

    <!-- ANA İÇERİK — İki Sütun -->
    <div class="dashboard">
      <div class="col">
        <div class="col-label green">AKTİF MÜŞTERİ</div>
        <div id="active-card" class="cust-card active-card empty">
          <div class="cc-badge">AKTİF</div>
          <div class="cc-empty">Aktif müşteri yok</div>
        </div>
      </div>
      <div class="dash-divider"></div>
      <div class="col">
        <div class="col-label orange">BEKLEYEN MÜŞTERİ</div>
        <div id="waiting-card" class="cust-card waiting-card empty">
          <div class="cc-badge">BEKLEME SLOTU</div>
          <div class="cc-empty">Boş — sıradaki müşteri buraya çağrılacak</div>
        </div>
      </div>
    </div>

    <!-- ALT BAR -->
    <div class="bottom-bar">
      <div class="mode-toggle-wrap">
        <label class="mode-switch"><input type="checkbox" id="auto-toggle" checked onchange="toggleAutoMode()"><span class="mode-slider"></span></label>
        <span class="mode-label" id="auto-label">Otomatik Çağırma AÇIK</span>
      </div>
      <button class="btn-cagir" id="btn-cagir" onclick="handleManuelCagir()" style="display:none">📢 Sıradaki Müşteriyi Çağır</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="kasiyer.js"></script>
</body>
</html>
