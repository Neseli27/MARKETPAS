<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B1120">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>MarketPas — Süper Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="superadmin.css">
</head>
<body>

  <!-- Giriş -->
  <div id="sa-login">
    <div class="sa-login-box">
      <div class="sa-logo">MARKET·PAS</div>
      <div class="sa-login-sub">Süper Admin Girişi</div>
      <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="sa-user" autocomplete="off"></div>
      <div class="fg"><label>Şifre</label><input type="password" id="sa-pass" onkeydown="if(event.key==='Enter') saLogin()"></div>
      <div class="sa-error" id="sa-login-error"></div>
      <button class="btn-sa" onclick="saLogin()">Giriş</button>
    </div>
  </div>

  <!-- Panel -->
  <div id="sa-panel" style="display:none">
    <div class="sa-header">
      <div style="display:flex;align-items:center;gap:16px">
        <span class="sa-market-count" id="sa-count">— market</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:#94A3B8;letter-spacing:2px;font-weight:600;">MARKET·PAS</span>
        <button class="btn-sa-sm" onclick="saLogout()">Çıkış</button>
      </div>
    </div>

    <!-- İstatistikler -->
    <div class="sa-stats" id="sa-stats">
      <div class="sa-stat"><div class="sa-stat-num" id="stat-total">—</div><div class="sa-stat-label">Toplam Market</div></div>
      <div class="sa-stat"><div class="sa-stat-num green" id="stat-active">—</div><div class="sa-stat-label">Aktif</div></div>
      <div class="sa-stat"><div class="sa-stat-num orange" id="stat-pending">—</div><div class="sa-stat-label">Onay Bekleyen</div></div>
      <div class="sa-stat"><div class="sa-stat-num red" id="stat-expired">—</div><div class="sa-stat-label">Süresi Dolmuş</div></div>
    </div>

    <!-- Filtre -->
    <div class="sa-filter-bar">
      <button class="sa-filter active" data-filter="all" onclick="saFilter('all')">Tümü</button>
      <button class="sa-filter" data-filter="pending" onclick="saFilter('pending')">Onay Bekleyen</button>
      <button class="sa-filter" data-filter="active" onclick="saFilter('active')">Aktif</button>
      <button class="sa-filter" data-filter="expired" onclick="saFilter('expired')">Süresi Dolmuş</button>
      <button class="sa-filter" data-filter="suspended" onclick="saFilter('suspended')">Askıda</button>
    </div>

    <!-- Market Listesi -->
    <div class="sa-list" id="sa-list"></div>

    <!-- Lisans Modal -->
    <div class="sa-modal-overlay" id="sa-modal" style="display:none" onclick="if(event.target===this) closeModal()">
      <div class="sa-modal">
        <div class="sa-modal-title" id="modal-title">Lisans Tanımla</div>
        <div class="sa-modal-sub" id="modal-sub"></div>
        <input type="hidden" id="modal-market-id">
        <div class="sa-license-options">
          <button class="license-btn" onclick="setLicense(15)">15 Gün<small>Deneme</small></button>
          <button class="license-btn" onclick="setLicense(30)">30 Gün</button>
          <button class="license-btn" onclick="setLicense(90)">90 Gün</button>
          <button class="license-btn" onclick="setLicense(180)">180 Gün</button>
          <button class="license-btn" onclick="setLicense(360)">360 Gün</button>
        </div>
        <button class="btn-sa-close" onclick="closeModal()">Kapat</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="superadmin.js"></script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});</script>
</body>
</html>
